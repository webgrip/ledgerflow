name: '[Workflow] On Source Change'

concurrency:
  group: source-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
    paths:
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'stubs/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - 'phpunit.eval.xml'
      - 'pint.json'
      - 'playwright.config.ts'
      - 'vite.config.js'
      - '.releaserc.js'
      - '.github/workflows/on_source_change.yml'
  pull_request:
    branches:
      - develop
      - main
      - master
    paths:
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'stubs/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - 'phpunit.eval.xml'
      - 'pint.json'
      - 'playwright.config.ts'
      - 'vite.config.js'
      - '.releaserc.js'
      - '.github/workflows/on_source_change.yml'

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Add Flux credentials
        if: ${{ secrets.FLUX_USERNAME != '' && secrets.FLUX_LICENSE_KEY != '' }}
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint
        run: composer lint:check

  static-analysis:
    name: 'Static Analysis'
    runs-on: ubuntu-latest
    environment: Testing
    needs: [lint]
    if: >
      always()
      && needs.lint.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Add Flux credentials
        if: ${{ secrets.FLUX_USERNAME != '' && secrets.FLUX_LICENSE_KEY != '' }}
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --error-format=github

  test:
    name: 'Test'
    runs-on: ubuntu-latest
    environment: Testing
    needs: [static-analysis]
    if: >
      always()
      && needs.static-analysis.result == 'success'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: laravel_testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Add Flux credentials
        if: ${{ secrets.FLUX_USERNAME != '' && secrets.FLUX_LICENSE_KEY != '' }}
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          php artisan key:generate
          echo "APP_ENV=testing" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=laravel_testing" >> .env
          echo "DB_USERNAME=sail" >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "CACHE_STORE=redis" >> .env
          echo "QUEUE_CONNECTION=redis" >> .env

      - name: Build assets
        run: npm run build

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run Pest
        run: ./vendor/bin/pest --compact

  release-publish:
    name: 'Release'
    runs-on: ubuntu-latest
    needs: [static-analysis, test]
    if: >
      always()
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
      && needs.static-analysis.result == 'success'
      && needs.test.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
